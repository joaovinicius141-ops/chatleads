<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crie Seu Contrato — Gerador Manual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5; color: #1a1a2e; min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff; padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: .5px; }
    header a { color: #fff; opacity: .7; text-decoration: none; font-size: .85rem; }
    header a:hover { opacity: 1; }
    main { max-width: 900px; margin: 0 auto; padding: 28px 16px; }

    .card {
      background: #fff; border-radius: 12px; padding: 24px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 20px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 18px; color: #16213e; }

    label {
      display: block; font-size: .85rem; font-weight: 600;
      color: #555; margin-bottom: 6px; margin-top: 14px;
    }
    label.required::after { content: " *"; color: #e74c3c; }

    input, select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #d0d4da;
      border-radius: 6px; font-size: .95rem; font-family: inherit;
      background: #fff; transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,.15);
    }
    textarea { resize: vertical; min-height: 70px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    @media (max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

    .subsection {
      font-size: .78rem; text-transform: uppercase;
      letter-spacing: 1px; color: #888; font-weight: 700;
      margin: 22px 0 4px; padding-bottom: 4px; border-bottom: 1px solid #eee;
    }

    .actions {
      display: flex; gap: 12px; align-items: center;
      margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee;
    }

    button {
      background: #6c63ff; color: #fff; border: none;
      padding: 12px 28px; border-radius: 8px; font-size: .95rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    button:hover:not(:disabled) { background: #5a52e0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    button.secondary { background: #95a5a6; }
    button.secondary:hover:not(:disabled) { background: #7f8c8d; }

    #mensagem {
      padding: 12px 16px; border-radius: 8px; font-size: .9rem;
      margin-top: 16px; display: none;
    }
    #mensagem.sucesso { background: #d4edda; color: #155724; display: block; }
    #mensagem.erro    { background: #f8d7da; color: #721c24; display: block; }
    #mensagem.carregando { background: #cfe2ff; color: #084298; display: block; }
    #mensagem a { color: inherit; font-weight: 700; }

    .hint { font-size: .75rem; color: #888; margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <h1>📄 Gerador Manual de Documentos</h1>
  <a id="link-painel" href="#">← Voltar ao painel</a>
</header>

<main>
  <div class="card">
    <h2>Novo documento</h2>

    <label class="required" for="tipo">Tipo de documento</label>
    <select id="tipo" onchange="renderizarFormulario()">
      <option value="">-- selecione --</option>
      <option value="declaracao">Declaração de Residência</option>
      <option value="recibo">Recibo de Pagamento</option>
      <option value="contrato">Contrato de Locação Residencial</option>
    </select>

    <div id="formulario"></div>

    <div class="actions" id="acoes" style="display:none">
      <button id="btn-gerar" onclick="gerar()">Gerar PDF</button>
      <button class="secondary" onclick="limpar()">Limpar</button>
    </div>

    <div id="mensagem"></div>
  </div>
</main>

<script>
  const secret = new URLSearchParams(window.location.search).get("secret") || "";
  document.getElementById("link-painel").href = `/admin/painel?secret=${encodeURIComponent(secret)}`;

  const HOJE = new Date().toISOString().slice(0, 10);

  // Definicao dos campos por tipo de documento.
  // { name, label, type, required, hint, placeholder, default }
  const CAMPOS = {
    declaracao: [
      { section: "Dados do declarante" },
      { name: "nome",            label: "Nome completo",        type: "text",   required: true },
      { name: "nacionalidade",   label: "Nacionalidade",        type: "text",   default: "Brasileiro(a)" },
      { name: "estado_civil",    label: "Estado civil",         type: "text",   placeholder: "solteiro(a), casado(a)..." },
      { name: "profissao",       label: "Profissão",            type: "text" },
      { section: "Documentos" },
      { name: "rg",              label: "RG",                   type: "text" },
      { name: "orgao_expedidor", label: "Órgão expedidor",      type: "text",   placeholder: "SSP/SP, SDS/PE..." },
      { name: "cpf",             label: "CPF",                  type: "text",   required: true, placeholder: "apenas números ou com pontuação" },
      { section: "Endereço" },
      { name: "endereco",        label: "Endereço",             type: "text",   required: true, placeholder: "Rua, número, complemento, bairro" },
      { name: "cidade",          label: "Cidade",               type: "text",   required: true },
      { name: "estado",          label: "UF",                   type: "text",   required: true, placeholder: "SP", maxlength: 2 },
      { name: "cep",             label: "CEP",                  type: "text" },
      { section: "Data" },
      { name: "data",            label: "Data da declaração",   type: "date",   default: HOJE },
    ],

    recibo: [
      { section: "Pagador" },
      { name: "pagador",       label: "Nome completo do pagador", type: "text", required: true },
      { name: "cpf_pagador",   label: "CPF/CNPJ do pagador",      type: "text" },
      { section: "Recebedor" },
      { name: "recebedor",     label: "Nome completo do recebedor", type: "text", required: true },
      { name: "cpf_recebedor", label: "CPF/CNPJ do recebedor",      type: "text" },
      { section: "Pagamento" },
      { name: "valor",         label: "Valor (R$)",               type: "number", required: true, placeholder: "1500.00", step: "0.01" },
      { name: "descricao",     label: "Referente a",              type: "textarea", required: true, placeholder: "ex: aluguel de abril, serviço de pintura..." },
      { section: "Local e data" },
      { name: "cidade",        label: "Cidade",                   type: "text" },
      { name: "estado",        label: "UF",                       type: "text", placeholder: "SP", maxlength: 2 },
      { name: "data",          label: "Data do recibo",           type: "date", default: HOJE },
    ],

    contrato: [
      { section: "Locador (dono do imóvel)" },
      { name: "locador",             label: "Nome completo",      type: "text", required: true },
      { name: "cpf_locador",         label: "CPF",                type: "text", required: true },
      { name: "rg_locador",          label: "RG",                 type: "text" },
      { name: "orgao_exp_locador",   label: "Órgão expedidor",    type: "text", placeholder: "SSP/SP" },
      { section: "Locatário (inquilino)" },
      { name: "locatario",           label: "Nome completo",      type: "text", required: true },
      { name: "cpf_locatario",       label: "CPF",                type: "text", required: true },
      { name: "rg_locatario",        label: "RG",                 type: "text" },
      { name: "orgao_exp_locatario", label: "Órgão expedidor",    type: "text", placeholder: "SSP/SP" },
      { section: "Imóvel" },
      { name: "endereco_imovel",     label: "Endereço completo",  type: "textarea", required: true, placeholder: "Rua, número, complemento, bairro, cidade - UF" },
      { section: "Condições do contrato" },
      { name: "valor_aluguel",       label: "Valor do aluguel (R$)", type: "number", required: true, step: "0.01" },
      { name: "dia_vencimento",      label: "Dia de vencimento",     type: "number", required: true, placeholder: "5", min: 1, max: 31 },
      { name: "data_inicio",         label: "Data de início",        type: "date", required: true, default: HOJE },
      { name: "duracao",             label: "Duração",               type: "text", required: true, placeholder: "12 meses, 2 anos..." },
      { name: "valor_caucao",        label: "Valor da caução (R$)",  type: "number", default: 0, step: "0.01", hint: "Deixe 0 se não houver caução" },
      { section: "Local e data da assinatura" },
      { name: "local_assinatura",    label: "Cidade da assinatura",  type: "text" },
      { name: "data_assinatura",     label: "Data da assinatura",    type: "date", default: HOJE },
    ],
  };

  function renderizarFormulario() {
    const tipo = document.getElementById("tipo").value;
    const container = document.getElementById("formulario");
    document.getElementById("acoes").style.display = tipo ? "flex" : "none";
    document.getElementById("mensagem").style.display = "none";

    if (!tipo) { container.innerHTML = ""; return; }

    const campos = CAMPOS[tipo];
    let html = "";
    for (const c of campos) {
      if (c.section) {
        html += `<div class="subsection">${c.section}</div>`;
        continue;
      }
      const lbl = `<label class="${c.required ? "required" : ""}" for="f_${c.name}">${c.label}</label>`;
      let input;
      if (c.type === "textarea") {
        input = `<textarea id="f_${c.name}" name="${c.name}" ${c.required ? "required" : ""} placeholder="${c.placeholder || ""}"></textarea>`;
      } else {
        const attrs = [
          c.required ? "required" : "",
          c.placeholder ? `placeholder="${c.placeholder}"` : "",
          c.maxlength ? `maxlength="${c.maxlength}"` : "",
          c.step ? `step="${c.step}"` : "",
          c.min != null ? `min="${c.min}"` : "",
          c.max != null ? `max="${c.max}"` : "",
          c.default != null ? `value="${c.default}"` : "",
        ].filter(Boolean).join(" ");
        input = `<input id="f_${c.name}" type="${c.type}" name="${c.name}" ${attrs}>`;
      }
      const hint = c.hint ? `<div class="hint">${c.hint}</div>` : "";
      html += `<div>${lbl}${input}${hint}</div>`;
    }
    container.innerHTML = html;
  }

  function coletarDados(tipo) {
    const dados = {};
    for (const c of CAMPOS[tipo]) {
      if (c.section) continue;
      const el = document.getElementById(`f_${c.name}`);
      if (!el) continue;
      let valor = el.value.trim();
      if (c.type === "number" && valor !== "") valor = Number(valor);
      if (valor === "" && c.default === undefined) continue;
      if (valor === "" && c.default !== undefined) valor = c.default;
      dados[c.name] = valor;
    }
    return dados;
  }

  async function gerar() {
    const tipo = document.getElementById("tipo").value;
    if (!tipo) return;

    // Validacao HTML5 nativa
    const form = document.getElementById("formulario");
    for (const el of form.querySelectorAll("[required]")) {
      if (!el.value.trim()) {
        el.focus();
        mostrarMensagem("erro", `Preencha o campo: ${el.previousElementSibling.textContent.replace(" *", "")}`);
        return;
      }
    }

    const btn = document.getElementById("btn-gerar");
    btn.disabled = true;
    mostrarMensagem("carregando", "Gerando PDF, aguarde...");

    try {
      const resp = await fetch(`/admin/gerar?secret=${encodeURIComponent(secret)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tipo, dados: coletarDados(tipo) }),
      });
      const json = await resp.json();

      if (!resp.ok || !json.sucesso) {
        mostrarMensagem("erro", json.erro || "Falha ao gerar documento");
        return;
      }

      mostrarMensagem(
        "sucesso",
        `PDF gerado: <strong>${json.nomeArquivo}</strong> — ` +
        `<a href="${json.url_download}" target="_blank">Baixar agora</a>`
      );
      // Abre o download automaticamente
      window.open(json.url_download, "_blank");
    } catch (e) {
      mostrarMensagem("erro", "Erro de rede: " + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  function mostrarMensagem(tipo, texto) {
    const el = document.getElementById("mensagem");
    el.className = tipo;
    el.innerHTML = texto;
  }

  function limpar() {
    document.getElementById("tipo").value = "";
    renderizarFormulario();
  }
</script>

</body>
</html>
